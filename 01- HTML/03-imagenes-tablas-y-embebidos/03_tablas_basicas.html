<!doctype html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Tablas basicas</title></head><body>
<h1>Tabla de precios</h1>
<table border="1">
<thead><tr><th>Producto</th><th>Precio</th><th>Categoria</th></tr></thead>
<tbody>
<tr><td>Curso HTML</td><td>19 USD</td><td>Cursos</td></tr>
<tr><td>Plantilla Hero</td><td>12 USD</td><td>Plantillas</td></tr>
</tbody>
</table>
<p>Usa tablas solo cuando tengas datos con filas y columnas reales.</p>
</body></html>
