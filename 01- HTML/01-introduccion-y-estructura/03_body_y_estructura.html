<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body y estructura</title>
  </head>
  <body>
    <header>
      <h1>Aprendiendo la estructura del body</h1>
    </header>

    <main>
      <section>
        <h2>Que va en body</h2>
        <p>
          Todo lo visible para el usuario: textos, imagenes, botones,
          formularios, listas, tablas y secciones.
        </p>
      </section>

      <section>
        <h2>Regla util</h2>
        <p>
          Si el usuario debe verlo o interactuar con ello, casi siempre vive en
          <code>body</code>.
        </p>
      </section>
    </main>

    <footer>
      <p>Pie de pagina de ejemplo.</p>
    </footer>
  </body>
</html>
