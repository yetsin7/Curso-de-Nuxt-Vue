<!doctype html>
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Landing responsive</title><style>
body { margin: 0; font-family: Arial, sans-serif; }
.wrap { width: min(1100px, calc(100% - 32px)); margin: 0 auto; }
.cards { display: grid; gap: 16px; }
.card { padding: 20px; background: #fff7ed; }
@media (min-width: 900px) { .cards { grid-template-columns: repeat(3, 1fr); } }
</style></head><body>
<main class="wrap"><section class="cards"><article class="card">Oferta</article><article class="card">Beneficio</article><article class="card">CTA</article></section></main>
</body></html>
